<ion-header class="app-header">
  <ion-toolbar>
    <ion-title>Color Change</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">
  <div class="page-container">
    <ion-card class="profile-card">
      <div class="profile-media">
        <img src="assets/renan.png" alt="Foto de Renan" class="profile-photo" />
      </div>

      <div class="profile-content">
        <ion-card-header>
          <span class="profile-label">Perfil acadêmico</span>
          <ion-card-title>Renan Domingues Antonio de Oliveira</ion-card-title>
        </ion-card-header>

        <ion-card-content>
          <div class="info-grid">
            <div class="info-item">
              <strong>Turma</strong>
              <span>ADS0301M</span>
            </div>

            <div class="info-item">
              <strong>Unidade</strong>
              <span>CG1/CG2</span>
            </div>

            <div class="info-item">
              <strong>Turno</strong>
              <span>Manhã</span>
            </div>

            <div class="info-item">
              <strong>Palavra-chave</strong>
              <span>Interface</span>
            </div>
          </div>

          <ion-button expand="block" routerLink="/color-change" class="primary-action">
            Abrir Color Change
          </ion-button>
        </ion-card-content>
      </div>
    </ion-card>
  </div>
</ion-content>
